name: Process Tournaments

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: process-tournaments
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate scheduler configuration
        env:
          PRODUCTION_APP_URL: ${{ vars.PRODUCTION_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$PRODUCTION_APP_URL" ]; then
            echo "Missing repository variable PRODUCTION_APP_URL" >&2
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing repository secret CRON_SECRET" >&2
            exit 1
          fi

      - name: Trigger tournament processing
        env:
          PRODUCTION_APP_URL: ${{ vars.PRODUCTION_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$PRODUCTION_APP_URL/api/cron/process-tournaments"
