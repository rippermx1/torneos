## ============================================================
## Torneos 2048 — Stack local de base de datos
##
## Emula Supabase Cloud con:
##   postgres  → base de datos
##   rest      → PostgREST (API REST sobre postgres)
##   proxy     → nginx que enruta /rest/v1/* → PostgREST
##
## Uso:
##   docker compose up -d        # levantar servicios de DB
##   npm run dev                 # correr Next.js en el host
##
## Credenciales locales fijas (solo para desarrollo):
##   URL de Supabase local:  http://localhost:54321
##   Anon key:               ver .env.local
##   Service role key:       ver .env.local
## ============================================================

services:

  # ── Base de datos ───────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "15432:5432"   # psql directo: psql -h localhost -p 15432 -U postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
      # Init scripts — se ejecutan en orden alfabético la primera vez
      - ./docker/init/00-roles.sql:/docker-entrypoint-initdb.d/00-roles.sql:ro
      - ./supabase/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./supabase/migrations/002_register_tournament_fn.sql:/docker-entrypoint-initdb.d/02-register.sql:ro
      - ./supabase/migrations/003_tournament_lifecycle_fns.sql:/docker-entrypoint-initdb.d/03-lifecycle.sql:ro
      - ./supabase/migrations/004_admin_tables.sql:/docker-entrypoint-initdb.d/04-admin.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  # ── PostgREST ───────────────────────────────────────────────
  rest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Usuario "authenticator" puede cambiar al rol que el JWT indique
      PGRST_DB_URI: postgres://authenticator:postgres@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_LOG_LEVEL: warn

  # ── Proxy (emula el API gateway de Supabase) ────────────────
  proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "54321:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - rest
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
    driver: local
