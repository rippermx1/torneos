events {}

http {
  # Emula el API gateway de Supabase Cloud.
  # El cliente JS hace requests a  ${SUPABASE_URL}/rest/v1/...
  # Aquí quitamos el prefijo /rest/v1 antes de pasárselo a PostgREST.

  upstream postgrest {
    server rest:3000;
  }

  server {
    listen 80;

    # ── PostgREST (/rest/v1/) ─────────────────────────────────
    location /rest/v1/ {
      proxy_pass         http://postgrest/;
      proxy_set_header   Host             $host;
      proxy_set_header   X-Real-IP        $remote_addr;
      proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;

      # El header "apikey" que el cliente JS envía sirve como Bearer token.
      # Si viene apikey pero no Authorization, lo usamos como Bearer.
      set $auth_header $http_authorization;
      if ($http_authorization = "") {
        set $auth_header "Bearer $http_apikey";
      }
      proxy_set_header   Authorization    $auth_header;
    }

    # ── Health check ─────────────────────────────────────────
    location /health {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }
}
